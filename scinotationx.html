<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Notation Explorer</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent-left: #ef4444;
            --accent-right: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 1.8rem;
        }

        p.intro {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .rule-box {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            gap: 15px;
        }

        .rule {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .rule.left {
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            color: var(--accent-left);
        }

        .rule.right {
            background-color: #ecfdf5;
            border: 1px solid #6ee7b7;
            color: var(--accent-right);
        }

        .mode-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .display-container {
            background: #f1f5f9;
            padding: 2rem 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .number-line {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            align-self: center;
        }

        .decimal {
            color: var(--primary);
            font-size: 2.8rem;
            line-height: 0;
            position: relative;
            display: inline-block;
            animation: bounce 0.3s ease;
            margin: 0 -2px;
        }

        .scientific-notation {
            font-size: 1.6rem;
            font-weight: 600;
            color: #334155;
        }

        .exponent {
            color: var(--primary);
            font-weight: bold;
        }

        .controls {
            margin-bottom: 2rem;
        }

        input[type="range"] {
            width: 100%;
            max-width: 400px;
            margin: 15px 0;
            accent-color: var(--primary);
        }

        .action-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }

        button {
            background-color: #e2e8f0;
            color: var(--text);
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #cbd5e1;
        }

        button.active {
            background-color: var(--primary);
            color: white;
        }
        button.active:hover {
            background-color: var(--primary-hover);
        }

        button.action-btn {
            background-color: #334155;
            color: white;
        }
        button.action-btn:hover {
            background-color: #1e293b;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scientific Notation Explorer</h1>
    <p class="intro">Drag the slider to move the decimal point and watch the exponent adjust in real-time!</p>

    <div class="rule-box">
        <div class="rule left">← Move Left = Exponent Up (+)</div>
        <div class="rule right">Move Right → = Exponent Down (-)</div>
    </div>

    <div class="mode-container">
        <button id="btn-large" class="active" onclick="changeMode('large')">Large Numbers</button>
        <button id="btn-small" onclick="changeMode('small')">Small Decimals</button>
    </div>

    <div class="display-container">
        <div class="number-line" id="numberLine"></div>
        <div class="scientific-notation" id="scientificNotation"></div>
    </div>

    <div class="controls">
        <label for="positionSlider" style="font-weight: 600;">Move Decimal Position:</label><br>
        <input type="range" id="positionSlider" min="1" max="7" value="7" oninput="updateDisplay()">
    </div>

    <div class="action-container">
        <button onclick="resetDecimal()">Reset Current</button>
        <button class="action-btn" onclick="generateNewExample()">Generate New Example ✨</button>
    </div>
</div>

<script>
    let currentMode = 'large';
    let currentDigits = [];
    let defaultDecimalPos = 7;

    // Generate a random digit between min and max (inclusive)
    function randomDigit(min = 0, max = 9) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Creates a brand new random puzzle layout based on the mode selected
    function generateNewExample() {
        if (currentMode === 'large') {
            // e.g., 5,400,000 or 8,120,000
            currentDigits = [
                randomDigit(1, 9).toString(), 
                randomDigit(1, 9).toString(), 
                randomDigit(0, 9).toString(), 
                '0', '0', '0', '0', '0'
            ];
            defaultDecimalPos = 8; // Decimal starts at the very end of the array
        } else {
            // e.g., 0.000034 or 0.00521
            currentDigits = [
                '0', '0', '0', '0', '0', 
                randomDigit(1, 9).toString(), 
                randomDigit(1, 9).toString(),
                randomDigit(0, 9).toString()
            ];
            defaultDecimalPos = 1; // Decimal starts after the first 0 (0.000...)
        }

        // Configure slider settings dynamically based on array constraints
        const slider = document.getElementById('positionSlider');
        slider.min = 1;
        slider.max = currentDigits.length - 1;
        
        resetDecimal();
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('btn-large').classList.toggle('active', mode === 'large');
        document.getElementById('btn-small').classList.toggle('active', mode === 'small');
        generateNewExample();
    }

    function resetDecimal() {
        const slider = document.getElementById('positionSlider');
        slider.value = defaultDecimalPos;
        updateDisplay();
    }

    function updateDisplay() {
        const slider = document.getElementById('positionSlider');
        const currentPos = parseInt(slider.value);
        
        // Exponent change depends on the relative distance traveled from home base
        const exponentShift = defaultDecimalPos - currentPos; 
        
        // 1. Build the interactive visual string 
        let htmlNumber = "";
        let rawCoefficientStr = "";
        
        for (let i = 0; i < currentDigits.length; i++) {
            if (i === currentPos) {
                htmlNumber += '<span class="decimal">.</span>';
                rawCoefficientStr += '.';
            }
            htmlNumber += currentDigits[i];
            rawCoefficientStr += currentDigits[i];
        }
        
        // Safety guard for trailing edge decimal assignment
        if (currentPos === currentDigits.length) {
            htmlNumber += '<span class="decimal">.</span>';
            rawCoefficientStr += '.';
        }

        document.getElementById('numberLine').innerHTML = htmlNumber;

        // 2. Clean up structural coefficient zero parsing
        let cleanCoefficient = parseFloat(rawCoefficientStr);
        if (!isNaN(cleanCoefficient)) {
            // Eliminate trailing structural zeros seamlessly without breaking float math
            cleanCoefficient = Number(cleanCoefficient.toFixed(6)).toString();
        } else {
            cleanCoefficient = "0";
        }

        // 3. Output the text using real <sup> (superscript) tags
        const sciExp = document.getElementById('scientificNotation');
        if (exponentShift === 0) {
            sciExp.innerHTML = `Original Value: <strong>${cleanCoefficient}</strong>`;
        } else {
            // Apply clean math signs inside the superscript tags
            const sign = exponentShift > 0 ? "" : ""; 
            sciExp.innerHTML = `${cleanCoefficient} × 10<sup class="exponent">${sign}${exponentShift}</sup>`;
        }
    }

    // Run configuration automatically on startup
    generateNewExample();
</script>

</body>
</html>
